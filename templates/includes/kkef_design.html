<script>
  document.addEventListener('alpine:init', () => {
    if (Alpine.data('pageReveal')) return;
    Alpine.data('pageReveal', () => ({
      visible: false,
      init() {
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) this.visible = true; },
          { threshold: 0.08 }
        );
        observer.observe(this.$el);
      },
    }));
    Alpine.data('impactPage', () => ({
      tiles: {},
      visible: false,
      init() {
        if (window.prefetchTiles) {
          window.prefetchTiles().then((d) => { this.tiles = d; });
        }
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) this.visible = true; },
          { threshold: 0.08 }
        );
        observer.observe(this.$el);
      },
    }));
  });
</script>
