<div
    class="mx-auto max-w-3xl text-center transition duration-700"
    :class="visible ? 'translate-y-0 opacity-100' : 'translate-y-6 opacity-0'"
>
    {% if kicker %}
    <p class="text-xs font-bold uppercase tracking-[0.32em] text-forest">{{ kicker }}</p>
    {% endif %}
    <h2 class="mt-2 font-serif text-2xl text-lagoon dark:text-white sm:text-3xl">{{ title }}</h2>
    {% if subtitle %}
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-300 sm:text-base">{{ subtitle }}</p>
    {% endif %}
</div>
