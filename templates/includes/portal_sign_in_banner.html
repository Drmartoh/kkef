{% if not user.is_authenticated %}
<div class="rounded-2xl border border-royal/20 bg-royal/5 px-4 py-3 text-sm text-slate-700 dark:border-white/10 dark:bg-white/5 dark:text-slate-200">
    <p class="font-semibold text-lagoon dark:text-white">Forum member tools</p>
    <p class="mt-1 text-slate-600 dark:text-slate-300">Sign in to submit proposals, RSVP to events, and access your mission deck.</p>
    <a href="{% url 'accounts:login' %}?next={{ request.path }}" class="mt-3 inline-flex rounded-full bg-lagoon px-4 py-2 text-xs font-semibold uppercase tracking-wide text-white">Forum login</a>
</div>
{% endif %}
